version: '3.8'

services:
  web:
    build: .
    container_name: filtec-web
    # Expose Django directly to host on 8040 (like your other projects)
    ports:
      - "127.0.0.1:8040:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DB_ENGINE=mysql
      - DB_NAME=filtec_db
      - DB_USER=filtec_user
      - DB_PASSWORD=filtec_password
      - DB_HOST=filtec-mysql
      - DB_PORT=3306
    depends_on:
      - mysql-db
    networks:
      - filtec-network
    restart: always

  mysql-db:
    image: mysql:8.0
    container_name: filtec-mysql
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=filtec_db
      - MYSQL_USER=filtec_user
      - MYSQL_PASSWORD=filtec_password
      - MYSQL_ROOT_PASSWORD=filtec_root_password
    networks:
      - filtec-network

volumes:
  mysql_data:
  static_volume:
  media_volume:

networks:
  filtec-network:
    driver: bridge
