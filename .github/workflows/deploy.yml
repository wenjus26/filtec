name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Ubuntu VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "Navigating to project directory on VPS..."
            cd /var/www/customer/filtec/filtec
            
            echo "Fetching latest changes from Git repository..."
            git pull origin main || echo "Notice: git pull skipped (directory might be updated via alternative tools)."
            
            echo "Rebuilding and restarting docker containers..."
            sudo docker compose up --build -d
            
            echo "Pruning old unused docker images..."
            sudo docker image prune -f
            
            echo "Deployment successfully completed!"
